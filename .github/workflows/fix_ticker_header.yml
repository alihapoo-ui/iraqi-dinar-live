name: Remove Bursa Ticker

on:
  push:
    paths:
      - ".github/workflows/fix_ticker_header.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove Bursa ticker from app.py
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path('app.py')
          s = p.read_text(encoding='utf-8')

          # Remove the ticker/update panel render block.
          s = re.sub(
              r"\nst\.markdown\(\s*f'''\s*<div class=\"live-panel\">.*?</div>\s*'''\s*,\s*unsafe_allow_html=True,\s*\)\n",
              "\n",
              s,
              flags=re.S,
          )

          # Remove ticker data-building logic.
          s = re.sub(
              r"\nminutes_display = min\(age_min, 99\)\nprogress_value = min\(100, max\(6, int\(\(minutes_display % 60\) / 60 \* 100\)\)\)\n\nparts = \[\].*?ticker_html = \"\"\.join\(parts \+ parts\)\n",
              "\n",
              s,
              flags=re.S,
          )

          # Remove Bursa ticker CSS only. Keep normal layout and rate-row sparkline CSS.
          css_remove_patterns = [
              r"\.live-panel\{.*?\}\n",
              r"\.update-clock\{.*?\}\n",
              r"\.update-clock:after\{.*?\}\n",
              r"\.update-number\{.*?\}\n",
              r"\.ticker-title\{.*?\}\n",
              r"\.ticker-window\{.*?\}\n",
              r"\.ticker-track\{.*?\}\n",
              r"\.ticker-item\{.*?\}\n",
              r"\.up\{color:#24d37a\}\.down\{color:#ff5d7d\}\.flat\{color:#dbe7ff\}\.ticker-sub\{.*?\}\n",
              r"@keyframes ticker\{.*?\}\n",
              r"\s*\.live-panel\{.*?\}\n",
              r"\s*\.update-clock\{.*?\}\.update-clock:after\{.*?\}\.update-number\{.*?\}\.ticker-track\{.*?\}\.ticker-item\{.*?\}\.ticker-window\{.*?\}\.ticker-sub\{.*?\}\n",
          ]
          for pattern in css_remove_patterns:
              s = re.sub(pattern, "", s, flags=re.S)

          # Restore card spacing after removing the top panel.
          s = s.replace(
              ".main-card{background:#fff;border:1px solid var(--line);border-radius:30px;padding:18px 28px 28px;margin-top:-38px;box-shadow:0 18px 42px rgba(15,23,42,.10);position:relative;z-index:5;}",
              ".main-card{background:#fff;border:1px solid var(--line);border-radius:30px;padding:28px;margin-top:-38px;box-shadow:0 18px 42px rgba(15,23,42,.10);position:relative;z-index:5;}"
          )
          s = s.replace(
              ".main-card{margin-top:-24px;border-radius:22px;padding:12px 12px 18px;}",
              ".main-card{margin-top:-24px;border-radius:22px;padding:16px;}"
          )

          # Make status pill show last updated instead of delayed label.
          s = s.replace("{T['live'] if age_min <= 180 else T['stale']}", "{T['last']}: {latest_time}")

          p.write_text(s, encoding='utf-8')
          PY

      - name: Verify syntax
        run: python -m py_compile app.py

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add app.py
          git commit -m "Remove Bursa ticker temporarily" || echo "No changes"
          git push
