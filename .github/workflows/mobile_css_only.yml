name: Mobile CSS Only

on:
  workflow_dispatch:
  push:
    paths:
      - trigger_mobile_polish.txt

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply polish patches
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('app.py')
          s = p.read_text(encoding='utf-8')

          s = s.replace('st.sidebar.markdown("## 🌐 Language")', 'st.markdown("### 🌐 Language")')
          s = s.replace('lang_label = st.sidebar.radio(', 'lang_label = st.radio(')
          s = s.replace('    key="lang",\n)', '    key="lang",\n    horizontal=True,\n)')

          old = 'def make_chart(data: pd.DataFrame, y_col: str, chart_type: str):\n    base = alt.Chart(data).encode('
          new = 'def make_chart(data: pd.DataFrame, y_col: str, chart_type: str):\n    y_min = float(data[y_col].min())\n    y_max = float(data[y_col].max())\n    pad = max((y_max - y_min) * 0.20, 500 if y_col == "Market" else 1)\n    y_domain = [max(0, y_min - pad), y_max + pad]\n    base = alt.Chart(data).encode('
          if old in s:
              s = s.replace(old, new)
              s = s.replace('scale=alt.Scale(zero=False), axis=alt.Axis(labelColor="#667085", gridColor="#f1f5f9"))', 'scale=alt.Scale(domain=y_domain, zero=False), axis=alt.Axis(labelColor="#667085", gridColor="#f1f5f9"))')

          css = '''
@media(max-width:768px){
  .hero{padding:22px .75rem 72px!important;}
  .hero-title{font-size:28px!important;line-height:1.1!important;}
  .hero-subtitle{font-size:14px!important;}
  .converter-card{margin-top:-44px!important;padding:14px!important;}
  .section-title{font-size:24px!important;}
  div[data-testid="metric-container"]{padding:12px!important;}
  div[data-testid="metric-container"] [data-testid="stMetricValue"]{font-size:1.18rem!important;white-space:normal!important;overflow:visible!important;text-overflow:clip!important;}
  .chart-card{padding:8px!important;overflow-x:auto!important;}
}
'''
          if 'font-size:1.18rem!important' not in s:
              s = s.replace('</style>', css + '</style>')

          marker = 'T = TEXT[code]\n'
          if marker in s and 'T.setdefault("market_price"' not in s:
              s = s.replace(marker, marker + 'T.setdefault("market_price", T.get("market", "Market"))\n')

          s = s.replace('\n# mobile polish marker\n', '\n')
          p.write_text(s, encoding='utf-8')
          PY

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add app.py
          git commit -m "Polish mobile layout and chart scale" || echo "No changes"
          git push
