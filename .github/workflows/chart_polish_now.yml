name: Chart Polish Now

on:
  push:
    paths:
      - ".github/workflows/chart_polish_now.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch chart and mobile UI
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('app.py')
          s = path.read_text(encoding='utf-8')

          # Move language selector from sidebar to page top if it is still in the sidebar.
          s = s.replace('st.sidebar.markdown("## 🌐 Language")', 'st.markdown("### 🌐 Language")')
          s = s.replace('lang_label = st.sidebar.radio(', 'lang_label = st.radio(')
          if 'key="lang",\n)' in s and 'horizontal=True' not in s.split('key="lang",', 1)[1].split(')', 1)[0]:
              s = s.replace('    key="lang",\n)', '    key="lang",\n    horizontal=True,\n)')

          # Replace the basic chart function with a more professional chart.
          pattern = r'def make_chart\(data: pd\.DataFrame, y_col: str, chart_type: str\):.*?return chart\.properties\(height=380\)\.configure_view\(strokeWidth=0\)\.interactive\(\)'
          replacement = r'''def make_chart(data: pd.DataFrame, y_col: str, chart_type: str):
              plot_df = data.copy().dropna(subset=["Time", y_col])
              if plot_df.empty:
                  return alt.Chart(pd.DataFrame({"Time": [], y_col: []})).mark_line()

              y_min = float(plot_df[y_col].min())
              y_max = float(plot_df[y_col].max())
              span = max(y_max - y_min, 1)
              pad = max(span * 0.18, 350 if y_col == "Market" else 1)
              y_domain = [max(0, y_min - pad), y_max + pad]

              label = T.get("per_100", "IQD per 100 USD") if y_col == "Market" else f"{T.get('per_1', 'IQD per 1')} {y_col}"

              nearest = alt.selection_point(nearest=True, on="mouseover", fields=["Time"], empty=False)

              base = alt.Chart(plot_df).encode(
                  x=alt.X(
                      "Time:T",
                      title=None,
                      axis=alt.Axis(labelColor="#667085", grid=False, labelPadding=10),
                  ),
                  y=alt.Y(
                      f"{y_col}:Q",
                      title=label,
                      scale=alt.Scale(domain=y_domain, nice=False, zero=False),
                      axis=alt.Axis(labelColor="#667085", grid=True, gridColor="#EEF2F7", tickCount=5),
                  ),
              )

              line = base.mark_line(color="#0B74E5", strokeWidth=3.5, interpolate="monotone").encode(
                  tooltip=[
                      alt.Tooltip("Time:T", title="Time", format="%Y-%m-%d %H:%M"),
                      alt.Tooltip(f"{y_col}:Q", title=y_col, format=",.2f"),
                  ]
              )

              area = base.mark_area(
                  color=alt.Gradient(
                      gradient="linear",
                      stops=[
                          alt.GradientStop(color="#0B74E5", offset=0),
                          alt.GradientStop(color="rgba(11,116,229,0.05)", offset=1),
                      ],
                      x1=1,
                      x2=1,
                      y1=1,
                      y2=0,
                  ),
                  opacity=0.22,
                  interpolate="monotone",
              )

              points = base.mark_circle(size=60, color="#0B74E5", opacity=0).add_params(nearest)
              active_points = base.mark_circle(size=90, color="#0B74E5").encode(
                  opacity=alt.condition(nearest, alt.value(1), alt.value(0))
              )
              rule = base.mark_rule(color="#94A3B8").encode(
                  opacity=alt.condition(nearest, alt.value(0.45), alt.value(0)),
                  tooltip=[
                      alt.Tooltip("Time:T", title="Time", format="%Y-%m-%d %H:%M"),
                      alt.Tooltip(f"{y_col}:Q", title=y_col, format=",.2f"),
                  ],
              )

              if chart_type == T.get("line", "Line") or chart_type == "Line":
                  chart = line + points + active_points + rule
              else:
                  chart = area + line + points + active_points + rule

              return (
                  chart.properties(height=340)
                  .configure_view(strokeWidth=0)
                  .configure_axis(labelFontSize=12, titleFontSize=12)
              )'''
          s2, count = re.subn(pattern, replacement, s, flags=re.S)
          if count:
              s = s2

          css = '''
/* Professional chart and mobile polish */
.chart-card{
  background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%)!important;
  border:1px solid #e4eaf3!important;
  border-radius:24px!important;
  padding:22px!important;
  box-shadow:0 18px 42px rgba(15,23,42,.08)!important;
}
@media(max-width:768px){
  .block-container{padding-left:.8rem!important;padding-right:.8rem!important;}
  .hero{margin-left:-.8rem!important;margin-right:-.8rem!important;padding:24px .8rem 78px!important;}
  .hero-title{font-size:30px!important;line-height:1.08!important;}
  .hero-subtitle{font-size:14px!important;}
  .converter-card{margin-top:-48px!important;padding:16px!important;border-radius:22px!important;}
  .section-title{font-size:24px!important;margin:30px 0 14px!important;}
  div[data-testid="metric-container"]{padding:13px!important;border-radius:16px!important;}
  div[data-testid="metric-container"] [data-testid="stMetricValue"]{font-size:1.22rem!important;line-height:1.25!important;white-space:normal!important;overflow:visible!important;text-overflow:clip!important;}
  .chart-card{padding:10px!important;border-radius:18px!important;overflow-x:auto!important;}
  .rate-card{padding:14px!important;}
}
'''
          if 'Professional chart and mobile polish' not in s:
              s = s.replace('</style>', css + '\n</style>')

          path.write_text(s, encoding='utf-8')
          PY

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add app.py
          git commit -m "Improve professional chart and mobile layout" || echo "No changes"
          git push
