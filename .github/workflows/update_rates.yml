name: Update IQD Rates

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-iqd-rates
  cancel-in-progress: true

jobs:
  update-rates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Update Script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          STRING_SESSION: ${{ secrets.STRING_SESSION }}
        run: python update_rates.py

      - name: Commit Updated CSV
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add usd_history.csv
          if git diff --cached --quiet; then
            echo "No CSV changes to commit"
            exit 0
          fi
          git commit -m "Auto update IQD rates"
          if ! git push origin "HEAD:$BRANCH"; then
            echo "Initial push failed, syncing with origin and retrying..."
            git fetch origin "$BRANCH"
            git rebase "origin/$BRANCH"
            git push origin "HEAD:$BRANCH"
          fi
