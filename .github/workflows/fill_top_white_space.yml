name: Fill Top White Space

on:
  push:
    paths:
      - ".github/workflows/fill_top_white_space.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch app.py top summary card
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('app.py')
          s = p.read_text(encoding='utf-8')

          css = '''
.quick-card{background:linear-gradient(135deg,#ffffff 0%,#f7fbff 100%);border:1px solid #e5eaf3;border-radius:24px;padding:18px 20px;margin:-6px 0 18px;box-shadow:0 12px 30px rgba(15,23,42,.07);display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr;gap:14px;align-items:center;}
.quick-title{font-size:13px;color:#657089;font-weight:900;text-transform:uppercase;letter-spacing:.04em;}
.quick-main{font-size:28px;font-weight:900;color:#07145f;letter-spacing:-.04em;white-space:nowrap;}
.quick-item{background:#fff;border:1px solid #eef2f7;border-radius:16px;padding:12px;}
.quick-label{font-size:11px;color:#657089;font-weight:900;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.quick-value{font-size:18px;font-weight:900;color:#17213a;white-space:nowrap;}
.quick-buy{color:#0f9f5f!important;}.quick-sell{color:#e23b67!important;}
@media(max-width:768px){.quick-card{grid-template-columns:1fr 1fr;margin:-2px 0 14px;padding:12px;gap:10px;border-radius:18px}.quick-card>div:first-child{grid-column:1/3}.quick-main{font-size:25px}.quick-value{font-size:16px}.quick-item{padding:10px;border-radius:14px}}
'''
          if '.quick-card{' not in s:
              s = s.replace('</style>', css + '\n</style>')

          old = "st.markdown('<div class=\"main-card\">', unsafe_allow_html=True)\ntab_convert, tab_charts, tab_history, tab_alerts = st.tabs([T[\"converter\"], T[\"charts\"], T[\"history\"], T[\"alerts\"]])"
          new = """st.markdown('<div class=\"main-card\">', unsafe_allow_html=True)

st.markdown(
    f'''
    <div class=\"quick-card\">
      <div>
        <div class=\"quick-title\">{T['one_usd']}</div>
        <div class=\"quick-main\">{market:,.0f} IQD</div>
        <div class=\"{change_class}\">{arrow} {change:,.0f} IQD ({pct:+.2f}%)</div>
      </div>
      <div class=\"quick-item\">
        <div class=\"quick-label\">{T['buy']}</div>
        <div class=\"quick-value quick-buy\">{buy:,.0f}</div>
      </div>
      <div class=\"quick-item\">
        <div class=\"quick-label\">{T['sell']}</div>
        <div class=\"quick-value quick-sell\">{sell:,.0f}</div>
      </div>
      <div class=\"quick-item\">
        <div class=\"quick-label\">{T['last']}</div>
        <div class=\"quick-value\" style=\"font-size:14px\">{latest_time}</div>
      </div>
    </div>
    ''',
    unsafe_allow_html=True,
)

tab_convert, tab_charts, tab_history, tab_alerts = st.tabs([T[\"converter\"], T[\"charts\"], T[\"history\"], T[\"alerts\"]])"""
          if old in s and 'class=\"quick-card\"' not in s:
              s = s.replace(old, new)

          p.write_text(s, encoding='utf-8')
          PY

      - name: Verify syntax
        run: python -m py_compile app.py

      - name: Commit change
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add app.py
          git commit -m "Fill hero white space with market summary" || echo "No changes"
          git push
