 (cd "$(git rev-parse --show-toplevel)" && git apply --3way <<'EOF' 
diff --git a/.github/workflows/backfill_history.yml b/.github/workflows/backfill_history.yml
new file mode 100644
index 0000000000000000000000000000000000000000..3c3e603a7e10f196149e788ecbdec2ef502db0f7
--- /dev/null
+++ b/.github/workflows/backfill_history.yml
@@ -0,0 +1,40 @@
+name: Backfill IQD History
+
+on:
+  workflow_dispatch:
+
+permissions:
+  contents: write
+
+jobs:
+  backfill-history:
+    runs-on: ubuntu-latest
+
+    steps:
+      - name: Checkout Repository
+        uses: actions/checkout@v4
+
+      - name: Set up Python
+        uses: actions/setup-python@v5
+        with:
+          python-version: "3.11"
+
+      - name: Install Requirements
+        run: |
+          python -m pip install --upgrade pip
+          pip install -r requirements.txt
+
+      - name: Run Backfill Script
+        env:
+          API_ID: ${{ secrets.API_ID }}
+          API_HASH: ${{ secrets.API_HASH }}
+          STRING_SESSION: ${{ secrets.STRING_SESSION }}
+        run: python backfill_history.py
+
+      - name: Commit Backfilled CSV
+        run: |
+          git config --global user.name "github-actions"
+          git config --global user.email "actions@github.com"
+          git add usd_history.csv
+          git commit -m "Backfill last 30 days IQD history" || echo "No changes"
+          git push
 
EOF
)
